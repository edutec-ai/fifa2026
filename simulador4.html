<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Simulador de Puntos - La Polla Mundialista 2026</title>
    <style>
        /* --- Variables de Diseño (Estilo Minimalista) --- */
        :root {
            --bg-dark: #121214;
            --green-light: #4c9e2f;
            --green-dark: #3d8b24;
            --line-white: rgba(255, 255, 255, 0.85);
            --cancha-width: 100%;
            --cancha-ratio: calc(105 / 68);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', Helvetica, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .simulador-card {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* ========== CANCHA DE FÚTBOL ========== */
        .cancha-wrapper {
            margin-bottom: 24px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .cancha-contenedor {
            position: relative;
            width: 100%;
            max-width: var(--cancha-width);
            aspect-ratio: var(--cancha-ratio);
            background-color: var(--green-light);
            background-image: linear-gradient(to right, 
                var(--green-light) 0%, var(--green-light) 8.33%, 
                var(--green-dark) 8.33%, var(--green-dark) 16.66%,
                var(--green-light) 16.66%, var(--green-light) 25%, 
                var(--green-dark) 25%, var(--green-dark) 33.33%,
                var(--green-light) 33.33%, var(--green-light) 41.66%, 
                var(--green-dark) 41.66%, var(--green-dark) 50%,
                var(--green-light) 50%, var(--green-light) 58.33%, 
                var(--green-dark) 58.33%, var(--green-dark) 66.66%,
                var(--green-light) 66.66%, var(--green-light) 75%, 
                var(--green-dark) 75%, var(--green-dark) 83.33%,
                var(--green-light) 83.33%, var(--green-light) 91.66%, 
                var(--green-dark) 91.66%, var(--green-dark) 100%
            );
            border: 3px solid var(--line-white);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cancha-contenedor::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 3px;
            background-color: var(--line-white);
            transform: translateX(-50%);
            z-index: 1;
        }

        .circulo-central {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 18%;
            aspect-ratio: 1;
            border: 3px solid var(--line-white);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            background: radial-gradient(circle, var(--line-white) 4px, transparent 5px);
        }

        .area-completa {
            position: relative;
            height: 74%;
            width: 15%;
            border: 3px solid var(--line-white);
            z-index: 2;
            display: flex;
            align-items: center;
        }

        .area-completa.izquierda {
            border-left: none;
        }

        .area-completa.derecha {
            border-right: none;
            justify-content: flex-end;
        }

        .area-chica {
            height: 40%;
            width: 35%;
            border: 3px solid var(--line-white);
        }

        .izquierda .area-chica {
            border-left: none;
        }

        .derecha .area-chica {
            border-right: none;
        }

        .bomba-area {
            position: absolute;
            top: 50%;
            width: 50%;
            aspect-ratio: 1;
            border: 3px solid var(--line-white);
            border-radius: 50%;
        }

        .izquierda .bomba-area {
            left: 100%;
            transform: translate(-50%, -50%);
            clip-path: inset(0 0 0 50%);
        }

        .derecha .bomba-area {
            right: 100%;
            transform: translate(50%, -50%);
            clip-path: inset(0 50% 0 0);
        }

        .punto-penal {
            position: absolute;
            top: 50%;
            width: 8px;
            height: 8px;
            background-color: var(--line-white);
            border-radius: 50%;
            transform: translateY(-50%);
        }

        .izquierda .punto-penal { left: 75%; }
        .derecha .punto-penal { right: 75%; }

        .porteria {
            position: absolute;
            top: 50%;
            height: 22%;
            width: 3%;
            border: 2px solid var(--line-white);
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.1);
        }

        .izquierda .porteria {
            right: 100%;
            border-right: none;
            border-radius: 4px 0 0 4px;
        }

        .derecha .porteria {
            left: 100%;
            border-left: none;
            border-radius: 0 4px 4px 0;
        }

        .corner {
            position: absolute;
            width: 2%;
            aspect-ratio: 1;
            border: 3px solid var(--line-white);
            border-radius: 50%;
        }

        .top-left     { top: -3px; left: -3px; clip-path: inset(50% 0 0 50%); }
        .top-right    { top: -3px; right: -3px; clip-path: inset(50% 50% 0 0); }
        .bottom-left  { bottom: -3px; left: -3px; clip-path: inset(0 0 50% 50%); }
        .bottom-right { bottom: -3px; right: -3px; clip-path: inset(0 50% 50% 0); }

        /* Badge PARTIDO EN VIVO flotante sobre la cancha (sin blink) */
        .badge-partido-en-vivo {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #ff3b30;
            color: white;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid white;
            z-index: 30;
            letter-spacing: 0.5px;
            font-family: monospace;
        }

        /* ========== PLACEHOLDERS FLOTANTES ========== */
        .flotante-local, .flotante-visita {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 14px 20px;
            z-index: 20;
            min-width: 140px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .flotante-local {
            left: 3%;
        }

        .flotante-visita {
            right: 3%;
        }

        .bandera {
            font-size: 36px;
            margin-bottom: 6px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .equipo-nombre {
            font-size: 10px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .control-goles {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .control-goles button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 14px;
            width: 30px;
            height: 30px;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .control-goles button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .control-goles button:active {
            transform: scale(0.95);
        }

        .goles-valor {
            font-size: 20px;
            font-weight: 800;
            color: #ffd700;
            min-width: 55px;
            text-align: center;
        }

        /* ========== SIMULADOR DE PUNTOS ========== */
.resultado-real-container {
    background: rgba(0, 0, 0, 0.3);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 20px;
}

.resultado-real-selector {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;              /* ← reducido de 30px a 8px (más pegado al VS) */
    margin-bottom: 16px;
    flex-wrap: wrap;
}

.resultado-equipo {
    text-align: center;
    flex: 1;
    min-width: 120px;
}

.resultado-equipo-nombre {
    font-size: 10px;        /* ← igual que .equipo-nombre (10px) */
    font-weight: 700;
    color: rgba(255, 255, 255, 0.7);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.resultado-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0px;              /* ← cambiado de 10px a 0px (pegados) */
}

.resultado-controls button {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 14px;
    width: 30px;
    height: 30px;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    transition: all 0.2s ease;
}

.resultado-controls button:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: scale(1.05);
}

.resultado-goles {
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    min-width: 45px;       /* ← reducido de 50px */
    text-align: center;
}

.resultado-vs {
    font-size: 18px;
    font-weight: 700;
    color: #ffd700;
    margin: 0 4px;         /* ← margen mínimo alrededor del VS */
}

        .badge-pronostico {
            background: rgba(255, 215, 0, 0.15);
            border-radius: 20px;
            padding: 8px 16px;
            text-align: center;
            margin-bottom: 16px;
        }

        .badge-pronostico span {
            font-size: 15px;
            font-weight: 700;
            color: #ffd700;
        }

        .botones-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        .fila-botones {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .btn-resultado {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            min-width: 65px;
        }

        .btn-resultado:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        .btn-resultado:active {
            transform: scale(0.98);
        }

        .btn-resultado.activo {
            background: #007aff;
            border-color: #007aff;
        }

        .tabla-puntos {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 16px;
        }

        .tabla-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tabla-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        /* Badge rojo en la tabla de puntos */
        .badge-base-rojo {
            background-color: #ff3b30;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid white;
            letter-spacing: 0.5px;
        }

        .fila-categoria {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
        }

        .fila-categoria:last-child {
            border-bottom: none;
        }

        .categoria-nombre {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .categoria-puntos {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .categoria-puntos.acierto {
            color: #ffd700;
        }

        .fila-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .total-nombre {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .total-puntos {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
        }

        .total-puntos.acierto {
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="simulador-card">
        <!-- CANCHA DE FÚTBOL -->
        <div class="cancha-wrapper">
            <div class="cancha-contenedor" id="cancha">
                <!-- Badge PARTIDO EN VIVO (esquina superior derecha, sin blink) -->
                <div class="badge-partido-en-vivo">🔴 PARTIDO EN VIVO</div>
                
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>
                <div class="circulo-central"></div>

                <div class="area-completa izquierda">
                    <div class="area-chica"></div>
                    <div class="bomba-area"></div>
                    <div class="punto-penal"></div>
                    <div class="porteria"></div>
                </div>

                <div class="area-completa derecha">
                    <div class="porteria"></div>
                    <div class="punto-penal"></div>
                    <div class="bomba-area"></div>
                    <div class="area-chica"></div>
                </div>

                <!-- Placeholders flotantes -->
                <div class="flotante-local">
                    <div class="bandera" id="bandera-local">🏳️</div>
                    <div class="equipo-nombre">EQUIPO A</div>
                    <div class="control-goles">
                        <button id="btn-dec-local">−</button>
                        <div class="goles-valor" id="gol-local">3</div>
                        <button id="btn-inc-local">+</button>
                    </div>
                </div>

                <div class="flotante-visita">
                    <div class="bandera" id="bandera-visita">🏳️</div>
                    <div class="equipo-nombre">EQUIPO B</div>
                    <div class="control-goles">
                        <button id="btn-dec-visita">−</button>
                        <div class="goles-valor" id="gol-visita">2</div>
                        <button id="btn-inc-visita">+</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- SIMULADOR DE PUNTOS -->
        <div class="badge-pronostico">
            <span>MI PRONÓSTICO</span>
        </div>

        <!-- SELECTOR DINÁMICO DE RESULTADO REAL -->
        <div class="resultado-real-container">
            <div class="resultado-real-selector">
                <div class="resultado-equipo">
                    <div class="resultado-equipo-nombre">⚽ EQUIPO A</div>
                    <div class="resultado-controls">
                        <button id="btn-real-dec-local">−</button>
                        <div class="resultado-goles" id="real-gol-local">0</div>
                        <button id="btn-real-inc-local">+</button>
                    </div>
                </div>
                <div class="resultado-vs">VS</div>
                <div class="resultado-equipo">
                    <div class="resultado-equipo-nombre">⚽ EQUIPO B</div>
                    <div class="resultado-controls">
                        <button id="btn-real-dec-visita">−</button>
                        <div class="resultado-goles" id="real-gol-visita">0</div>
                        <button id="btn-real-inc-visita">+</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTONES PREDEFINIDOS -->
        <div class="botones-grid">
            <div class="fila-botones">
                <button class="btn-resultado" data-local="3" data-visita="0">3 - 0</button>
                <button class="btn-resultado" data-local="3" data-visita="1">3 - 1</button>
                <button class="btn-resultado" data-local="3" data-visita="2">3 - 2</button>
                <button class="btn-resultado" data-local="3" data-visita="3">3 - 3</button>
                
            </div>
            <div class="fila-botones">
                <button class="btn-resultado" data-local="2" data-visita="0">2 - 0</button>
                <button class="btn-resultado" data-local="2" data-visita="1">2 - 1</button>
                <button class="btn-resultado" data-local="2" data-visita="2">2 - 2</button>
                <button class="btn-resultado" data-local="2" data-visita="3">2 - 3</button>
                
            </div>
            <div class="fila-botones">
                <button class="btn-resultado" data-local="0" data-visita="0">0 - 0</button>
                <button class="btn-resultado" data-local="1" data-visita="0">1 - 0</button>
                <button class="btn-resultado" data-local="1" data-visita="1">1 - 1</button>
                <button class="btn-resultado" data-local="1" data-visita="2">1 - 2</button>
                
            </div>
        </div>

        <!-- TABLA DE PUNTOS -->
        <div class="tabla-puntos">
            <div class="tabla-header">
                <h3>📋 Detalle de puntos</h3>
                <div class="badge-base-rojo">BASE: 20 PTS</div>
            </div>
            <div class="fila-categoria">
                <div class="categoria-nombre">🏆 Ganador / Empate</div>
                <div class="categoria-puntos" id="pts-ganador">0 pts</div>
            </div>
            <div class="fila-categoria">
                <div class="categoria-nombre">⚽ Gol local exacto</div>
                <div class="categoria-puntos" id="pts-gol-local">0 pts</div>
            </div>
            <div class="fila-categoria">
                <div class="categoria-nombre">⚽ Gol visita exacto</div>
                <div class="categoria-puntos" id="pts-gol-visita">0 pts</div>
            </div>
            <div class="fila-categoria">
                <div class="categoria-nombre">📊 Diferencia de goles</div>
                <div class="categoria-puntos" id="pts-diferencia">0 pts</div>
            </div>
            <div class="fila-categoria">
                <div class="categoria-nombre">🔄 Marcador inverso</div>
                <div class="categoria-puntos" id="pts-inverso">0 pts</div>
            </div>
            <div class="fila-total">
                <div class="total-nombre">⭐ PUNTAJE TOTAL</div>
                <div class="total-puntos" id="total-puntos">0 pts</div>
            </div>
        </div>
    </div>

    <script>
        // Banderas aleatorias
        const BANDERAS = ['🇦🇷', '🇧🇷', '🇫🇷', '🇩🇪', '🇪🇸', '🇮🇹', '🇳🇱', '🇵🇹', '🇬🇧', '🇺🇸', '🇲🇽', '🇨🇴', '🇯🇵', '🇦🇺'];
        
        document.getElementById('bandera-local').textContent = BANDERAS[Math.floor(Math.random() * BANDERAS.length)];
        document.getElementById('bandera-visita').textContent = BANDERAS[Math.floor(Math.random() * BANDERAS.length)];

        const PUNTOS = {
            GANADOR: 8,
            GOL_LOCAL: 4,
            GOL_VISITA: 4,
            DIFERENCIA: 4,
            INVERSO: 4
        };

        let pronosticoLocal = 3;
        let pronosticoVisita = 2;
        let resultadoRealLocal = 0;
        let resultadoRealVisita = 0;

        function getGanador(local, visita) {
            if (local > visita) return 'local';
            if (visita > local) return 'visita';
            return 'empate';
        }

        function getDiferencia(local, visita) {
            return Math.abs(local - visita);
        }

        function calcularPuntos() {
            let puntos = {
                ganador: 0,
                golLocal: 0,
                golVisita: 0,
                diferencia: 0,
                inverso: 0,
                total: 0
            };

            const pronosticoGanador = getGanador(pronosticoLocal, pronosticoVisita);
            const realGanador = getGanador(resultadoRealLocal, resultadoRealVisita);
            
            if (pronosticoGanador === realGanador) {
                puntos.ganador = PUNTOS.GANADOR;
            }

            if (resultadoRealLocal === pronosticoLocal) {
                puntos.golLocal = PUNTOS.GOL_LOCAL;
            }

            if (resultadoRealVisita === pronosticoVisita) {
                puntos.golVisita = PUNTOS.GOL_VISITA;
            }

            const pronosticoDiferencia = getDiferencia(pronosticoLocal, pronosticoVisita);
            const realDiferencia = getDiferencia(resultadoRealLocal, resultadoRealVisita);
            if (pronosticoDiferencia === realDiferencia) {
                puntos.diferencia = PUNTOS.DIFERENCIA;
            }

            if (pronosticoGanador !== realGanador) {
                if (resultadoRealLocal === pronosticoVisita && resultadoRealVisita === pronosticoLocal) {
                    puntos.inverso = PUNTOS.INVERSO;
                }
            }

            puntos.total = puntos.ganador + puntos.golLocal + puntos.golVisita + puntos.diferencia + puntos.inverso;
            return puntos;
        }

        function actualizarUI() {
            const puntos = calcularPuntos();

            document.getElementById('pts-ganador').innerHTML = `${puntos.ganador} pts`;
            document.getElementById('pts-gol-local').innerHTML = `${puntos.golLocal} pts`;
            document.getElementById('pts-gol-visita').innerHTML = `${puntos.golVisita} pts`;
            document.getElementById('pts-diferencia').innerHTML = `${puntos.diferencia} pts`;
            document.getElementById('pts-inverso').innerHTML = `${puntos.inverso} pts`;
            document.getElementById('total-puntos').innerHTML = `${puntos.total} pts`;

            const elementos = [
                { id: 'pts-ganador', valor: puntos.ganador },
                { id: 'pts-gol-local', valor: puntos.golLocal },
                { id: 'pts-gol-visita', valor: puntos.golVisita },
                { id: 'pts-diferencia', valor: puntos.diferencia },
                { id: 'pts-inverso', valor: puntos.inverso }
            ];

            elementos.forEach(el => {
                const element = document.getElementById(el.id);
                if (el.valor > 0) {
                    element.classList.add('acierto');
                } else {
                    element.classList.remove('acierto');
                }
            });

            const totalEl = document.getElementById('total-puntos');
            if (puntos.total > 0) {
                totalEl.classList.add('acierto');
            } else {
                totalEl.classList.remove('acierto');
            }
        }

        function actualizarPronosticoEnUI() {
            document.getElementById('gol-local').textContent = pronosticoLocal;
            document.getElementById('gol-visita').textContent = pronosticoVisita;
            actualizarUI();
        }

        function actualizarResultadoEnUI() {
            document.getElementById('real-gol-local').textContent = resultadoRealLocal;
            document.getElementById('real-gol-visita').textContent = resultadoRealVisita;
            actualizarUI();
        }

        function cambiarPronosticoLocal(delta) {
            let nuevo = pronosticoLocal + delta;
            if (nuevo >= 0 && nuevo <= 20) {
                pronosticoLocal = nuevo;
                actualizarPronosticoEnUI();
            }
        }

        function cambiarPronosticoVisita(delta) {
            let nuevo = pronosticoVisita + delta;
            if (nuevo >= 0 && nuevo <= 20) {
                pronosticoVisita = nuevo;
                actualizarPronosticoEnUI();
            }
        }

        function cambiarResultadoLocal(delta) {
            let nuevo = resultadoRealLocal + delta;
            if (nuevo >= 0 && nuevo <= 20) {
                resultadoRealLocal = nuevo;
                actualizarResultadoEnUI();
                document.querySelectorAll('.btn-resultado').forEach(b => b.classList.remove('activo'));
            }
        }

        function cambiarResultadoVisita(delta) {
            let nuevo = resultadoRealVisita + delta;
            if (nuevo >= 0 && nuevo <= 20) {
                resultadoRealVisita = nuevo;
                actualizarResultadoEnUI();
                document.querySelectorAll('.btn-resultado').forEach(b => b.classList.remove('activo'));
            }
        }

        function setResultadoReal(local, visita) {
            resultadoRealLocal = local;
            resultadoRealVisita = visita;
            actualizarResultadoEnUI();
        }

        // Eventos de pronóstico (sobre la cancha)
        document.getElementById('btn-inc-local').addEventListener('click', () => cambiarPronosticoLocal(1));
        document.getElementById('btn-dec-local').addEventListener('click', () => cambiarPronosticoLocal(-1));
        document.getElementById('btn-inc-visita').addEventListener('click', () => cambiarPronosticoVisita(1));
        document.getElementById('btn-dec-visita').addEventListener('click', () => cambiarPronosticoVisita(-1));

        // Eventos de resultado real (selectores dinámicos)
        document.getElementById('btn-real-inc-local').addEventListener('click', () => cambiarResultadoLocal(1));
        document.getElementById('btn-real-dec-local').addEventListener('click', () => cambiarResultadoLocal(-1));
        document.getElementById('btn-real-inc-visita').addEventListener('click', () => cambiarResultadoVisita(1));
        document.getElementById('btn-real-dec-visita').addEventListener('click', () => cambiarResultadoVisita(-1));

        // Eventos de botones predefinidos
        const botones = document.querySelectorAll('.btn-resultado');
        botones.forEach(btn => {
            btn.addEventListener('click', function() {
                const local = parseInt(this.dataset.local);
                const visita = parseInt(this.dataset.visita);
                setResultadoReal(local, visita);
                
                botones.forEach(b => b.classList.remove('activo'));
                this.classList.add('activo');
            });
        });

        // Inicializar
        actualizarPronosticoEnUI();
        actualizarResultadoEnUI();
    </script>
</body>
</html>
